<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VenueFlow AI | MetroArena Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <h1>VenueFlow <span class="ai-badge">AI</span></h1>
                <p class="subtitle">MetroArena Assistant</p>
            </div>
        </header>

        <main class="chat-container" id="chat-container">
            <div class="message system-message">
                <div class="message-bubble">
                    Welcome to MetroArena! I'm VenueFlow AI, your smart venue assistant. 
                    Ask me about gates, food stalls, restrooms, parking, or first aid.
                </div>
            </div>
            <!-- Messages will be injected here -->
        </main>

        <footer class="app-footer">
            <form id="chat-form" class="chat-form">
                <input type="text" id="user-input" placeholder="Ask about MetroArena..." autocomplete="off" required>
                <button type="submit" id="send-btn" aria-label="Send Message">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="send-icon"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
